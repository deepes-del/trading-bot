<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Bot Control Panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
        }

        .box {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:hover {
            background: #0056b3;
        }

        .stop-btn {
            background: #dc3545;
        }

        .stop-btn:hover {
            background: #a71d2a;
        }

        #message {
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        #logs-container {
            margin-top: 20px;
            background: #111;
            color: #0f0;
            padding: 10px;
            border-radius: 10px;
        }

        #logs-box {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 10px;
            font-family: monospace;
        }

        .log-entry {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <h1>Trading Bot Console</h1>

    <!-- AUTH SECTION -->
    <div id="auth-section" class="box">
        <h2>Login / Register</h2>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button onclick="handleAuth('register')">Register</button>
        <button onclick="handleAuth('login')">Login</button>
    </div>

    <!-- BOT CONTROL SECTION -->
    <div id="bot-section" class="box hidden" style="display: flex; gap: 20px; flex-wrap: wrap;">
        <!-- LEFT SIDE: RULES -->
        <div style="flex: 1; min-width: 200px; background: #f4f4f4; border: 1px solid #ccc; padding: 15px; border-radius: 8px;">
            <h3 style="margin-top:0;">📐 Parameter Rules</h3>
            <ul id="bot-rules-list" style="list-style-type: none; padding: 0; line-height: 2.2;">
                <li><strong>Index:</strong> <span id="r-index">NIFTY</span></li>
                <li><strong>Mode:</strong> <span id="r-mode">Default</span></li>
                <li><strong>Lots:</strong> <span id="r-lots">1</span></li>
                <li><strong>Stop Loss:</strong> <span id="r-sl">Dynamic</span></li>
                <li><strong>Target:</strong> <span id="r-target">Dynamic</span></li>
            </ul>
        </div>

        <!-- RIGHT SIDE: CONTROLS -->
        <div style="flex: 2; min-width: 300px;">
            <h2 style="margin-top:0;">Bot Controls</h2>
            <p>Logged in as: <span id="display-username"></span></p>

            <div class="form-group">
                <label>Bot Mode</label>
                <select id="mode" onchange="toggleCustomFields(); updateRules();">
                <option value="default">Default (EMA 1:2)</option>
                <option value="custom">Custom (Fixed SL/Target)</option>
            </select>
        </div>

        <div id="custom-fields" class="hidden">
            <div class="form-group">
                <label>Stop Loss (Points)</label>
                <input type="number" id="sl" value="10" oninput="updateRules()">
            </div>
            <div class="form-group">
                <label>Target (Points)</label>
                <input type="number" id="target" value="20" oninput="updateRules()">
            </div>
        </div>

        <div class="form-group">
            <label>Lots</label>
            <input type="number" id="lots" value="1" min="1" max="10" step="1" oninput="this.value = this.value.replace(/[^0-9]/g, ''); if(this.value === '') this.value=1; updateRules();">
        </div>

        <div class="form-group">
            <label>Index</label>
            <select id="index" onchange="updateRules()">
                <option value="NIFTY">NIFTY</option>
                <option value="BANKNIFTY">BANKNIFTY</option>
            </select>
        </div>

        <button onclick="startBot()">Start Bot</button>
        <button class="stop-btn" onclick="stopBot()">Stop Bot</button>
        <button onclick="logout()" style="background:#6c757d; margin-top:10px;">Logout</button>

            <div id="logs-container">
                <h3>📊 Bot Logs</h3>
                <div id="logs-box"></div>
            </div>
        </div> <!-- End right controls -->
    </div>

    <div id="message" class="hidden"></div>

    <script>
        const authSection = document.getElementById('auth-section');
        const botSection = document.getElementById('bot-section');
        const customFields = document.getElementById('custom-fields');
        const msgDiv = document.getElementById('message');

        // Check if already logged in
        window.onload = () => {
            const token = localStorage.getItem('session_token');
            const user = localStorage.getItem('username');
            if (token) showBotPanel(user);
        };

        function showMessage(text, isError = false) {
            msgDiv.textContent = text;
            msgDiv.className = isError ? 'error' : 'success';
            msgDiv.classList.remove('hidden');
            setTimeout(() => msgDiv.classList.add('hidden'), 5000);
        }

        function toggleCustomFields() {
            const mode = document.getElementById('mode').value;
            customFields.className = mode === 'custom' ? '' : 'hidden';
        }

        async function handleAuth(type) {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            if (!u || !p) return showMessage("Please enter username and password", true);

            try {
                // Backend uses query parameters for username/password
                const url = `/${type}?username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`;
                const res = await fetch(url, { method: 'POST' });
                const data = await res.json();

                if (data.status === 'success' || data.status === 'registered') {
                    if (type === 'login') {
                        localStorage.setItem('session_token', data.session_token);
                        localStorage.setItem('username', u);
                        showBotPanel(u);
                        showMessage("Login successful!");
                    } else {
                        showMessage("Registration successful! You can now login.");
                    }
                } else {
                    showMessage(data.error || "Action failed", true);
                }
            } catch (e) {
                showMessage("Server error: " + e.message, true);
            }
        }

        function showBotPanel(username) {
            authSection.classList.add('hidden');
            botSection.classList.remove('hidden');
            document.getElementById('display-username').textContent = username;
        }

        function logout() {
            localStorage.clear();
            botSection.classList.add('hidden');
            authSection.classList.remove('hidden');
            showMessage("Logged out.");
        }

        function updateRules() {
            const mode = document.getElementById('mode').value;
            const sl = document.getElementById('sl').value;
            const target = document.getElementById('target').value;
            const index = document.getElementById('index').value;
            const lots = document.getElementById('lots').value;

            document.getElementById('r-index').textContent = index;
            document.getElementById('r-mode').textContent = mode === 'custom' ? 'Custom' : 'Default';
            document.getElementById('r-lots').textContent = lots;
            document.getElementById('r-sl').textContent = mode === 'custom' ? sl : 'Dynamic';
            document.getElementById('r-target').textContent = mode === 'custom' ? target : 'Dynamic';
        }

        async function startBot() {
            const index = document.getElementById('index').value;
            const mode = document.getElementById('mode').value;
            const lots = document.getElementById('lots').value;
            const sl = document.getElementById('sl').value;
            const target = document.getElementById('target').value;
            
            const msg = `START BOT CONFIRMATION\n\nAre you sure you want to deploy with these parameters?\n\nIndex: ${index}\nLots: ${lots}\nMode: ${mode === 'custom' ? `Custom (SL: ${sl}, Target: ${target})` : 'Default (Dynamic SL/Target)'}`;
            if (!confirm(msg)) return;

            const token = localStorage.getItem('session_token');
            const payload = {
                mode: mode,
                sl: parseInt(sl),
                target: parseInt(target),
                index: index,
                lots: parseInt(lots)
            };

            try {
                const res = await fetch(`/start-bot?session_token=${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.status) showMessage(data.status);
                else showMessage(data.error, true);
            } catch (e) {
                showMessage("Failed to start bot", true);
            }
        }

        async function stopBot() {
            const token = localStorage.getItem('session_token');
            try {
                const res = await fetch(`/stop-bot?session_token=${token}`, { method: 'POST' });
                const data = await res.json();
                if (data.status) {
                    showMessage(data.status);
                    setTimeout(() => {
                        document.getElementById("logs-box").innerHTML = "";
                    }, 1500); // clear UI after final stopped log pulls through
                }
                else showMessage(data.error, true);
            } catch (e) {
                showMessage("Failed to stop bot", true);
            }
        }

        async function fetchLogs() {
            const sessionToken = localStorage.getItem('session_token');
            if (!sessionToken) return;

            try {
                const res = await fetch(`/logs?session_token=${sessionToken}`);
                const data = await res.json();

                if (!data.logs) return;

                const logBox = document.getElementById("logs-box");

                logBox.innerHTML = data.logs.map(log =>
                    `<div class="log-entry">▶ ${log}</div>`
                ).join("");

                logBox.scrollTop = logBox.scrollHeight;

            } catch (err) {
                console.error("Log fetch error:", err);
            }
        }

        // refresh every 2 sec
        setInterval(fetchLogs, 2000);
    </script>
</body>

</html>
